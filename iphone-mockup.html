<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup generator</title>
<style>
  body {
    font-family: sans-serif;
    background: #222;
    color: #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px;
  }
  #previewWrapper {
    position: relative;
    width: 234.5px;
    height: 479px;
  }
  canvas {
    width: 100%;
    height: 100%;
    background: transparent;
  }
  button, input {
    background: #333;
    color: #eee;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .chips {
    display: flex;
    gap: 6px;
  }
  .chip input {
    display: none;
  }
  .chip span {
    padding: 6px 12px;
    border-radius: 999px;
    background: #333;
    cursor: pointer;
    user-select: none;
  }
  .chip input:checked + span {
    background: #555;
  }
</style>
</head>
<body>

<h2>iPhone mockup generator</h2>

<input type="file" id="screenshotInput" accept="image/*">

<label>
  <input type="checkbox" id="proportionsToggle" checked>
  Save proportions
</label>

<div class="chips">
  <label class="chip">
    <input type="radio" name="color" value="orange" checked>
    <span>Orange</span>
  </label>
  <label class="chip">
    <input type="radio" name="color" value="dark-blue">
    <span>Dark blue</span>
  </label>
  <label class="chip">
    <input type="radio" name="color" value="silver">
    <span>Silver</span>
  </label>
</div>

<button id="downloadBtn" disabled>Download image</button>

<div id="previewWrapper">
  <canvas id="canvas" width="938" height="1916"></canvas>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const downloadBtn = document.getElementById('downloadBtn');
  const input = document.getElementById('screenshotInput');
  const proportionsToggle = document.getElementById('proportionsToggle');

  const phoneOverlay = new Image();
  let overlayLoaded = false;

  const screenshot = new Image();
  let screenshotLoaded = false;

  const overlays = {
    'orange': 'iphone-17-pro-max__orange.png',
    'dark-blue': 'iphone-17-pro-max__dark-blue.png',
    'silver': 'iphone-17-pro-max__silver.png'
  };

  function setOverlay(color) {
    overlayLoaded = false;
    phoneOverlay.src = overlays[color];
  }

  phoneOverlay.onload = () => {
    overlayLoaded = true;
    draw();
  };

  setOverlay('orange');

  document.querySelectorAll('input[name="color"]').forEach(radio => {
    radio.addEventListener('change', () => {
      setOverlay(radio.value);
    });
  });

  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => screenshot.src = ev.target.result;
    reader.readAsDataURL(file);
  });

  screenshot.onload = () => {
    screenshotLoaded = true;
    downloadBtn.disabled = false;
    draw();
  };

  proportionsToggle.addEventListener('change', draw);

  function drawImage(ctx, img, x, y, w, h, keepRatio) {
    if (!keepRatio) {
      ctx.drawImage(img, x, y, w, h);
      return;
    }

    const scale = w / img.width;
    const srcHeight = Math.min(img.height, h / scale);

    ctx.drawImage(
      img,
      0,
      0,
      img.width,
      srcHeight,
      x,
      y,
      w,
      srcHeight * scale
    );
  }

  function clipPhone(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.clip();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (screenshotLoaded) {
      const x = 46, y = 42, w = 846, h = 1838, r = 102;
      ctx.save();
      clipPhone(ctx, x, y, w, h, r);
      drawImage(ctx, screenshot, x, y, w, h, proportionsToggle.checked);
      ctx.restore();
    }

    if (overlayLoaded) {
      ctx.drawImage(phoneOverlay, 0, 0, canvas.width, canvas.height);
    }
  }

  downloadBtn.addEventListener('click', () => {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 938;
    tempCanvas.height = 1916;
    const tctx = tempCanvas.getContext('2d');

    if (screenshotLoaded) {
      const x = 46, y = 42, w = 846, h = 1838, r = 102;
      tctx.save();
      clipPhone(tctx, x, y, w, h, r);
      drawImage(tctx, screenshot, x, y, w, h, proportionsToggle.checked);
      tctx.restore();
    }

    if (overlayLoaded) {
      tctx.drawImage(phoneOverlay, 0, 0, 938, 1916);
    }

    const link = document.createElement('a');
    link.download = 'mockup.png';
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
  });
</script>

</body>
</html>
